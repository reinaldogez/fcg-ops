name: fcg

services:
  # ---------- infraestrutura de dados ----------
  sqlserver-identity:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQLSERVER_SA_PASSWORD}
    healthcheck:
      # $$ escapa o $ para o compose nao interpolar: a var resolve dentro do container.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    volumes:
      - "sqlserver-identity-data:/var/opt/mssql"

  # Banco relacional do catalog: estado que importa (seed de jogos, pedidos) -> volume
  # nomeado. Endereco por nome de servico (postgres-catalog:5432) na rede interna;
  # sem porta no host.
  postgres-catalog:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_CATALOG_PASSWORD}
      POSTGRES_DB: catalog
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalog"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - "postgres-catalog-data:/var/lib/postgresql/data"

  # Banco relacional do payments: estado que importa (decisoes de pagamento) -> volume
  # nomeado. Endereco por nome de servico (postgres-payments:5432) na rede interna;
  # sem porta no host.
  postgres-payments:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PAYMENTS_PASSWORD}
      POSTGRES_DB: payments
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - "postgres-payments-data:/var/lib/postgresql/data"

  # Store de idempotencia descartavel (TTL curto): sem volume nomeado, fs efemero do
  # container. Endereco por nome de servico (redis:6379) na rede interna; sem porta no host.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------- broker de mensageria ----------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "15672:15672"   # Management UI exposta localmente; AMQP 5672 fica so na rede interna
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - "rabbitmq-data:/var/lib/rabbitmq"

  # ---------- observabilidade (LGTM + OTel Collector) ----------
  # Telemetria descartavel: sem volumes nomeados, fs efemero do container.
  # Enderecos sempre por nome de servico na rede interna do compose.

  # Recebe OTLP gRPC :4317 dos servicos; roteia traces->Tempo e expoe metricas em :8889.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - "./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml"
    # 4317 (OTLP gRPC) e 8889 (Prometheus exporter) ficam so na rede interna.

  # Logs: recebe push direto do sink Serilog do identity em :3100.
  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - "./observability/loki/loki.yaml:/etc/loki/loki.yaml"

  # Traces: recebe OTLP gRPC :4317 do collector; serve lookup ao Grafana em :3200.
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - "./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml"

  # Metricas: faz scrape (pull) do exporter do collector; API em :9090.
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - "./observability/prometheus:/etc/prometheus"

  # UI de observabilidade; datasources Loki/Tempo/Prometheus provisionados no boot.
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"   # UI exposta localmente
    volumes:
      - "./observability/grafana/provisioning:/etc/grafana/provisioning"

  # ---------- orquestracao do identity ----------
  # build+image no mesmo bloco: `up --build` constroi de ../fcg-identity e tagueia como
  # image; `up` (sem flag) puxa a image publicada do GHCR. O secret gh_token so e usado no
  # modo --build (restore autenticado do feed NuGet); o modo pull-GHCR nao o consome.

  # One-shot: aplica as migrations e encerra (nao sobe host) antes da API subir.
  # A validacao fail-fast da chave de assinatura roda no composition root, antes do ramo
  # --migrate, entao este servico tambem recebe a chave RSA via override local.
  identity-migrate:
    build:
      context: ../fcg-identity
      secrets: [gh_token]
    image: ghcr.io/reinaldogez/fcg-identity:latest
    command: ["dotnet", "Fcg.Identity.Api.dll", "--migrate"]
    restart: "no"
    depends_on:
      sqlserver-identity: { condition: service_healthy }
    environment:
      ConnectionStrings__DefaultConnection: ${IDENTITY_DB_CONNECTION}

  # API: sobe so depois do banco e do broker healthy e da migration concluida com sucesso.
  # A chave RSA de assinatura (Jwt__RsaPrivateKeyPem/Jwt__KeyId) vem do override local
  # (a mesma chave injetada no identity-migrate).
  identity-api:
    build:
      context: ../fcg-identity
      secrets: [gh_token]
    image: ghcr.io/reinaldogez/fcg-identity:latest
    ports:
      - "8081:8080"   # host 8081 -> container 8080
    depends_on:
      sqlserver-identity: { condition: service_healthy }
      rabbitmq:           { condition: service_healthy }
      identity-migrate:   { condition: service_completed_successfully }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: ${IDENTITY_DB_CONNECTION}
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      Jwt__Issuer: fcg-identity
      Jwt__Audience: fcg
      AdminSeed__DefaultPassword: ${ADMINSEED_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      Loki__Url: http://loki:3100

  # ---------- orquestracao do notifications ----------
  # Worker de notificacoes: consumer-only (MassTransit em background); o HTTP expoe so
  # /health/live e /health/ready (Redis) — sem REST de negocio.
  notifications-api:
    build:
      context: ../fcg-notifications
      secrets: [gh_token]
    image: ghcr.io/reinaldogez/fcg-notifications:latest
    ports:
      - "8082:8080"   # diagnostico de health no host (8081 e do identity); nao e REST de negocio
    depends_on:
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      Redis__Connection: ${REDIS_CONNECTION}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      Loki__Url: http://loki:3100

  # ---------- orquestracao do catalog ----------
  # One-shot: aplica as migrations e semeia o catalogo de jogos (seed idempotente),
  # encerrando sem subir host. So precisa do Postgres; nao toca broker nem auth.
  catalog-migrate:
    build:
      context: ../fcg-catalog
      secrets: [gh_token]
    image: ghcr.io/reinaldogez/fcg-catalog:latest
    command: ["dotnet", "Fcg.Catalog.Api.dll", "--migrate", "--seed"]
    restart: "no"
    depends_on:
      postgres-catalog: { condition: service_healthy }
    environment:
      ConnectionStrings__Catalog: ${CATALOG_DB_CONNECTION}

  # API de catalogo: resource server que valida tokens do identity via JWKS
  # (busca lazy com retry na primeira request autenticada; por isso sem depends_on
  # do identity-api — nao ha acoplamento de boot).
  catalog-api:
    build:
      context: ../fcg-catalog
      secrets: [gh_token]
    image: ghcr.io/reinaldogez/fcg-catalog:latest
    ports:
      - "8083:8080"   # host 8083 -> container 8080
    depends_on:
      postgres-catalog: { condition: service_healthy }
      rabbitmq:         { condition: service_healthy }
      catalog-migrate:  { condition: service_completed_successfully }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__Catalog: ${CATALOG_DB_CONNECTION}
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      Jwt__JwksUri: http://identity-api:8080/.well-known/jwks.json
      Jwt__RequireHttpsMetadata: "false"   # JWKS por http na rede interna do compose
      Jwt__Issuer: fcg-identity
      Jwt__Audience: fcg
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      Loki__Url: http://loki:3100

  # ---------- orquestracao do payments ----------
  # One-shot: aplica as migrations e encerra (nao sobe host) antes do worker subir.
  # So precisa do Postgres; nao semeia dados nem toca broker/auth.
  payments-migrate:
    build:
      context: ../fcg-payments
      secrets: [gh_token]
    image: ghcr.io/reinaldogez/fcg-payments:latest
    command: ["dotnet", "Fcg.Payments.Api.dll", "--migrate"]
    restart: "no"
    depends_on:
      postgres-payments: { condition: service_healthy }
    environment:
      ConnectionStrings__Payments: ${PAYMENTS_DB_CONNECTION}

  # Worker de pagamentos: consumer-only + publisher (MassTransit em background); o HTTP
  # expoe so /health/live e /health/ready (Postgres) — sem REST de negocio, sem auth.
  # A fila order-placed.fcg-payments e criada no startup; sem acoplamento de boot ao catalog.
  payments-api:
    build:
      context: ../fcg-payments
      secrets: [gh_token]
    image: ghcr.io/reinaldogez/fcg-payments:latest
    ports:
      - "8084:8080"   # diagnostico de health no host (8081/8082/8083 ja usados); nao e REST de negocio
    depends_on:
      postgres-payments: { condition: service_healthy }
      rabbitmq:          { condition: service_healthy }
      payments-migrate:  { condition: service_completed_successfully }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__Payments: ${PAYMENTS_DB_CONNECTION}
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      Payment__RejectionThreshold: "5000"   # gateway simulado: preco <= threshold aprova, > rejeita
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      Loki__Url: http://loki:3100

volumes:
  sqlserver-identity-data:
  postgres-catalog-data:
  postgres-payments-data:
  rabbitmq-data:

# Ponteiro do secret de build: o PAT vem da env var GH_TOKEN exportada no shell no momento
# do `up --build`. So o ponteiro e versionado; o valor nunca entra no repositorio. O id
# gh_token casa com o secret mount esperado pelo build do identity.
secrets:
  gh_token:
    environment: "GH_TOKEN"

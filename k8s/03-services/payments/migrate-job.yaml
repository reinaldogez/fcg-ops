apiVersion: batch/v1
kind: Job
metadata:
  name: payments-migrate
  namespace: fcg
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-payments 5432; do sleep 2; done']
      containers:
        - name: migrate
          image: ghcr.io/reinaldogez/fcg-payments:latest
          # --migrate (sem seed): aplica as migrations e encerra sem subir o host
          # HTTP. Pagamentos nao semeiam dados.
          command: ["dotnet", "Fcg.Payments.Api.dll", "--migrate"]
          envFrom:
            - configMapRef:
                name: payments-config
            - secretRef:
                name: payments-secret

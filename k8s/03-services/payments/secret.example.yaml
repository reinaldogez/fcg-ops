apiVersion: v1
kind: Secret
metadata:
  name: payments-secret
  namespace: fcg
type: Opaque
stringData:
  # Connection string do Postgres com a senha EMBUTIDA. A senha aqui deve ser a
  # MESMA do POSTGRES_PASSWORD no postgres-payments-secret (k8s/01-infra/
  # postgres-payments). Por carregar credencial, a connection inteira e sensivel
  # e mora aqui no Secret, nunca no ConfigMap.
  ConnectionStrings__Payments: "Host=postgres-payments;Database=payments;Username=postgres;Password=REPLACE_ME"
  RabbitMq__Username: "REPLACE_ME"
  RabbitMq__Password: "REPLACE_ME"

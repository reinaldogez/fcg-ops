apiVersion: v1
kind: Secret
metadata:
  name: notifications-secret
  namespace: fcg
type: Opaque
stringData:
  # Connection string do Redis com a senha EMBUTIDA. A senha aqui deve ser a MESMA
  # do REDIS_PASSWORD no redis-secret (k8s/01-infra/redis), analogamente ao SA
  # password do identity. Por carregar credencial, a connection inteira e sensivel
  # e mora aqui no Secret, nunca no ConfigMap.
  Redis__Connection: "redis:6379,password=REPLACE_ME"
  RabbitMq__Username: "REPLACE_ME"
  RabbitMq__Password: "REPLACE_ME"

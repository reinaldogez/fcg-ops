apiVersion: batch/v1
kind: Job
metadata:
  name: catalog-migrate
  namespace: fcg
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-catalog 5432; do sleep 2; done']
      containers:
        - name: migrate
          image: ghcr.io/reinaldogez/fcg-catalog:latest
          # --migrate --seed: aplica migrations e semeia o catalogo (seed-if-empty,
          # idempotente), encerrando sem subir o host HTTP.
          command: ["dotnet", "Fcg.Catalog.Api.dll", "--migrate", "--seed"]
          envFrom:
            - configMapRef:
                name: catalog-config
            - secretRef:
                name: catalog-secret

apiVersion: v1
kind: Secret
metadata:
  name: catalog-secret
  namespace: fcg
type: Opaque
stringData:
  # Connection string do Postgres com a senha EMBUTIDA. A senha aqui deve ser a
  # MESMA do POSTGRES_PASSWORD no postgres-catalog-secret (k8s/01-infra/
  # postgres-catalog). Por carregar credencial, a connection inteira e sensivel
  # e mora aqui no Secret, nunca no ConfigMap.
  ConnectionStrings__Catalog: "Host=postgres-catalog;Database=catalog;Username=postgres;Password=REPLACE_ME"
  RabbitMq__Username: "REPLACE_ME"
  RabbitMq__Password: "REPLACE_ME"

apiVersion: v1
kind: Secret
metadata:
  name: postgres-payments-secret
  namespace: fcg
type: Opaque
stringData:
  # Senha pura do usuario postgres, aplicada no initdb do primeiro boot.
  # Deve ser a MESMA senha embutida na ConnectionStrings__Payments do
  # payments-secret (k8s/03-services/payments), analogamente ao par
  # postgres-catalog-secret / catalog-secret.
  POSTGRES_PASSWORD: "REPLACE_ME"

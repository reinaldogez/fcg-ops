apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: fcg
type: Opaque
stringData:
  # Senha pura usada pelo --requirepass do servidor Redis.
  # Deve ser a MESMA senha embutida na connection string do consumidor
  # (Redis__Connection, definida no Secret do serviço de notifications),
  # analogamente ao SA password do identity. Aqui mora só a senha.
  REDIS_PASSWORD: "REPLACE_ME"
